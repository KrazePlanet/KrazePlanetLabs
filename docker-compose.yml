# ============================================================
# KrazePlanetLabs - Docker Compose
# Security Training Platform (PHP + Apache + MySQL)
#
# Usage:
#   docker compose up -d
#   Access: http://localhost:8080
#
# WARNING: This platform is intentionally vulnerable.
#          DO NOT expose to the internet or production networks.
# ============================================================

services:

  # --- Web / PHP Application -----------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kzlabs_web
    restart: unless-stopped
    ports:
      - "8080:80"         # Main web interface  ? http://localhost:8080
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: ""
      DB_NAME: KrazePlanetLabs_DB
    volumes:
      - ./uploads:/var/www/html/uploads    # Persist uploaded files
      - ./logs:/var/www/html/logs          # Persist application logs
      - ./storage:/var/www/html/storage    # Persist storage data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kzlabs_net

  # --- MySQL Database -------------------------------------------
  db:
    image: mysql:8.0
    container_name: kzlabs_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ""               # Matches project default (empty root password)
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: KrazePlanetLabs_DB
    ports:
      - "3306:3306"        # MySQL port (optional: remove if not needed externally)
    volumes:
      - kzlabs_db_data:/var/lib/mysql       # Persist database data
      - ./docker/mysql/init:/docker-entrypoint-initdb.d  # Auto-load SQL init scripts
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - kzlabs_net

  # --- phpMyAdmin (Optional GUI for DB) ------------------------
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: kzlabs_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"          # phpMyAdmin UI ? http://localhost:8081
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ""
      MYSQL_ROOT_PASSWORD: ""
      UPLOAD_LIMIT: 50M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kzlabs_net

# --- Named Volumes --------------------------------------------
volumes:
  kzlabs_db_data:
    driver: local

# --- Networks -------------------------------------------------
networks:
  kzlabs_net:
    driver: bridge
