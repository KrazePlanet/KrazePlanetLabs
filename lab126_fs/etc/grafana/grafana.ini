##################### Grafana Configuration #####################
# grafana.mariadb.org
# Grafana v8.2.2 (last updated before patch)

#################################### Paths ####################################
[paths]
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning

#################################### Server ####################################
[server]
protocol = http
http_addr = 127.0.0.1
http_port = 3000
domain = grafana.mariadb.org
enforce_domain = false
root_url = https://grafana.mariadb.org/
serve_from_sub_path = false

#################################### Database ####################################
[database]
type = mysql
host = 127.0.0.1:3306
name = grafana
user = grafana_db
# WARNING: plaintext credentials in config
password = Gr@fan@_DB_s3cr3t!
url =
max_idle_conn = 2
max_open_conn = 0
conn_max_lifetime = 14400
log_queries =
ssl_mode = disable

#################################### Security ####################################
[security]
# Lab flag
# flag{grafana_mariadb_lfi_1419213}
secret_key = flag{grafana_mariadb_lfi_1419213}
disable_initial_admin_creation = false
admin_user = admin
admin_password = mariadb_grafana_2021!
login_remember_days = 7
cookie_secure = true
cookie_samesite = lax
allow_embedding = false

#################################### Users ####################################
[users]
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_id = 1
auto_assign_org_role = Viewer
default_theme = dark

#################################### Auth ####################################
[auth]
login_cookie_name = grafana_session
login_maximum_inactive_lifetime = 7d
login_maximum_lifetime = 30d

[auth.anonymous]
enabled = false
org_name = MariaDB
org_role = Viewer

#################################### Logging ####################################
[log]
mode = file
level = info

[log.file]
log_rotate = true
max_lines = 1000000
max_size_shift = 28
daily_rotate = true
max_days = 7

#################################### SMTP ####################################
[smtp]
enabled = false
host = localhost:25
user =
password =
from_address = grafana@mariadb.org
from_name = Grafana MariaDB
